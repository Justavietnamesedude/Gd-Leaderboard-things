<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asian - GD Profile</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#111;
    color:white;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:220px;
    height:100%;
    background:#181818;
    border-right:2px solid #333;
    padding:20px;
    box-sizing:border-box;
}

.sidebar h2{
    margin-top:0;
    color:#888;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    margin:10px 0;
}

.sidebar a:hover{
    color:#aaa;
}

.main{
    margin-left:260px;
    padding:30px;
}

.profile-header{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
}

.rank-badge{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#444;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    font-weight:bold;
}

.player-info h1{
    margin:0;
    font-size:42px;
}

.player-info p{
    margin:5px 0;
    color:#bbb;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.card{
    background:#1b1b1b;
    border:1px solid #333;
    border-radius:10px;
    padding:20px;
    min-width:200px;
}

.card h3{
    margin-top:0;
    color:#aaa;
}

.progress-section{
    margin-bottom:35px;
}

.progress-bar{
    width:100%;
    background:#333;
    border-radius:8px;
    overflow:hidden;
    height:25px;
}

.progress-fill{
    height:100%;
    background:#888;
}

.section{
    margin-top:35px;
}

.section h2{
    border-bottom:2px solid #333;
    padding-bottom:10px;
}

.demon-list{
    columns:2;
}

.demon-list li{
    margin-bottom:8px;
}

.easy{
    color:#9a44ff;
    font-weight:bold;
}

@media(max-width:900px){

.sidebar{
    position:relative;
    width:auto;
    height:auto;
}

.main{
    margin-left:0;
}

.demon-list{
    columns:1;
}

}
</style>
</head>

<body>

<div class="sidebar">
    <h2>GD Leaderboard</h2>
    <a href="index.html">Leaderboard</a>
</div>

<div class="main">

    <div class="profile-header">

        <div class="rank-badge">
            #5
        </div>

        <div class="player-info">
            <h1>Asian</h1>
            <p>Current #5 Ranked Player</p>
            <p>Hardest Demon: <span class="easy">Super Cycles</span></p>
        </div>

    </div>

    <div class="cards">

        <div class="card">
            <h3>Score</h3>
            <h1>2.980</h1>
        </div>

        <div class="card">
            <h3>Points</h3>
            <h1>2.980</h1>
        </div>

        <div class="card">
            <h3>Completions</h3>
            <h1>2</h1>
        </div>

    </div>

    <div class="progress-section">
        <h2>Leaderboard Progress</h2>

        <div class="progress-bar">
            <div class="progress-fill" style="width:100%"></div>
        </div>

        <p>2.980 / 2.980 Points</p>
    </div>

    <div class="section">
        <h2>Completed Demons</h2>

        <ul class="demon-list">
            <li class="easy">Super Cycles</li>
            <li class="easy">The Nightmare</li>
        </ul>
    </div>

</div>

</body>
</html>
