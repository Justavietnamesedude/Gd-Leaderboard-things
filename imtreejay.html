.roptop { color:#a100a1; }

/* Breakdown list */
ul{
    columns:2;
    padding-left:20px;
}

/* small text */
small{opacity:0.8;}
</style>
</head>

// -----------------------------
// HELPERS
// -----------------------------
function splitPlayers(str){
    return str.split(/and|,/).map(s=>s.trim()).filter(Boolean);
}

function getDifficultyClass(diff){
    if(diff.includes("Extreme")) return "extreme";
    if(diff.includes("Insane")) return "insane";
    if(diff.includes("Hard")) return "hard";
    if(diff.includes("Medium")) return "medium";
    if(diff.includes("Easy")) return "easy";
    return "roptop";
}

// -----------------------------
// AGGREGATE DATA
// -----------------------------
const players = {};

for(const lvl of levels){
    const beaters = splitPlayers(lvl.beater);

    for(const p of beaters){
        if(!players[p]){
            players[p] = {
                score:0,
                list:[]
            };
        }
        players[p].score += lvl.score;
        players[p].list.push(lvl);
    }
}

// -----------------------------
// SORT PLAYERS
// -----------------------------
const sorted = Object.entries(players)
.sort((a,b)=>b[1].score - a[1].score);

// -----------------------------
// RENDER
// -----------------------------
const app = document.getElementById("app");

sorted.forEach(([name,data],i)=>{

    const card = document.createElement("div");
    card.className = "card";

    const hardest = data.list.reduce((a,b)=>a.score>b.score?a:b);

    card.innerHTML = `
        <h2>${i+1}. ${name}</h2>
        <div class="rank">#${i+1}</div>

        <p><strong>Total Score:</strong> ${data.score.toFixed(3)}</p>
        <p><strong>Hardest Level:</strong> ${hardest.title}</p>
        <p><strong>Completions:</strong> ${data.list.length}</p>

        <h3>Completion Breakdown</h3>
        <ul>
            ${data.list.map(l=>
                `<li class="${getDifficultyClass(l.difficulty)}">${l.title}</li>`
            ).join("")}
        </ul>
    `;

    app.appendChild(card);
});
