<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magma Bound - Demon List</title>

<style>
:root{
    --bg:#0d0d0d;
    --panel:#181818;
    --accent:#ffae00;
    --text:#ffffff;
    --sub:#aaaaaa;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
}

header{
    background:#111;
    padding:25px;
    border-bottom:3px solid var(--accent);
}

header h1{
    color:var(--accent);
    font-size:42px;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.profile-card{
    background:var(--panel);
    border-left:6px solid #8b0000;
    padding:30px;
    border-radius:8px;
}

.level-name{
    font-size:50px;
    font-weight:bold;
}

.creator{
    color:var(--sub);
    margin-top:10px;
    font-size:22px;
}

.badge{
    display:inline-block;
    margin-top:15px;
    padding:8px 14px;
    border-radius:5px;
    background:#8b0000;
    font-weight:bold;
}

.stats{
    margin-top:35px;
}

.stat{
    margin-bottom:18px;
    font-size:22px;
}

.victors{
    margin-top:40px;
}

.victors h2{
    color:var(--accent);
    margin-bottom:15px;
}

.victor{
    background:#222;
    padding:12px;
    margin-bottom:10px;
    border-radius:6px;
}

.victor a{
    color:#4da3ff;
    text-decoration:none;
    font-weight:bold;
}

.victor a:hover{
    text-decoration:underline;
}

.back{
    display:inline-block;
    margin-top:40px;
    color:#4da3ff;
    text-decoration:none;
}

.back:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<header>
    <h1>Magma Bound</h1>
</header>

<div class="container">

<div class="profile-card">

    <div class="level-name">Magma Bound</div>

    <div class="creator">
        Created by ScorchVX
    </div>

    <div class="badge">
        Insane Demon
    </div>

    <div class="stats">
        <div class="stat"><b>Rank:</b> #5</div>
        <div class="stat"><b>GDDL Score:</b> 15.74</div>
        <div class="stat"><b>Points:</b> 63.74</div>
        <div class="stat"><b>Completion Date:</b> 1 Oct 2024</div>
    </div>

    <div class="victors">
        <h2>Beater</h2>

        <div class="victor">
            <a href="imtreejay.html">imTreeJay</a>
        </div>
    </div>

    <a class="back" href="]yap.html">← Back to Demon List</a>

</div>

</div>

</body>
</html>
